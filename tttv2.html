<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>tic tac toe v2</title>
    <link rel="stylesheet" href="tttv2.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>
<body>

    <main class="main">

        <div class="name"><i class="fa-solid fa-arrow-pointer"></i>Tic Tac Toe<i class="fa-solid fa-arrow-pointer"></i></div>
        
        <div class="strt">

            <button class="strtbtn"><i class="fa-solid fa-circle-play"></i>Start Game<i class="fa-solid fa-circle-play"></i></button>

            <div class="boxes">
                <div class="box"></div>
                <div class="box"></div>
                <div class="box"></div>
                <div class="box"></div>
                <div class="box"></div>
                <div class="box"></div>
                <div class="box"></div>
                <div class="box"></div>
                <div class="box"></div>
            </div>

            <div class="winner"></div>

            <div class="button">
            <button class="restart btn">Re-Start</button> 
            <button class="home btn">Home</button>
            </div>

        </div>
        
    </main>

    <script src="tttv2.js"></script>

</body>
</html>
